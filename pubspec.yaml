name: ventry_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  bloc: ^9.1.0
  get_it: ^8.0.3
  injectable: ^2.5.0
  dio: ^5.8.0
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  go_router: ^14.7.2
  equatable: ^2.0.7
  flutter_dotenv: ^6.0.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  retrofit: 4.0.1
  talker: ^5.1.17
  talker_dio_logger: ^5.1.17
  talker_bloc_logger: ^5.1.17
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.6
  rxdart: ^0.28.0
  bloc_concurrency: ^0.3.0
  image_picker: ^1.2.2
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  uuid: ^4.5.3
  intl: ^0.20.3
  mobile_scanner: ^7.2.0
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.6.2
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  rename_app: ^1.6.6
  retrofit_generator: ^8.1.0
  mocktail: ^1.0.5
  drift_dev: ^2.14.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  retrofit_generator: 7.0.8

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
    - assets/fonts/
    - shorebird.yaml

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/ventry_icon_bg.png
  adaptive_icon_background: "#F7F9FB"
  adaptive_icon_foreground: assets/images/ventry_icon_no_bg.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/ventry_icon_bg.png
    background_color: "#F7F9FB"
    theme_color: "#00685F"
  windows:
    generate: true
    image_path: assets/images/ventry_icon_bg.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/images/ventry_icon_bg.png

flutter_native_splash:
  color: "#F7F9FB"
  image: assets/images/ventry_splash_icon.png
  android: true
  ios: false
  web: true
  android_12:
    color: "#F7F9FB"
    image: assets/images/ventry_splash_icon.png
